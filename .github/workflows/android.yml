name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y zip unzip git openjdk-17-jdk autoconf automake libtool pkg-config zlib1g-dev

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK
        env:
          ANDROID_ACCEPT_LICENSE: "True"
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk